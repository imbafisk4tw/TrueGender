<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e8e8e8;
    }

    .header h1 { font-size: 16px; font-weight: 700; color: #2c3e50; }

    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 12px; color: #666; }

    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 11px; transition: background 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4A90D9; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #999; margin-bottom: 8px;
    }

    /* ─── Profile selector ─── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .profile-btn {
      padding: 8px 6px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-size: 12px;
      color: #555;
      position: relative;
    }

    .profile-btn:hover { border-color: #bbb; background: #f5f5f5; }
    .profile-btn.active { border-color: #4A90D9; background: #EBF3FC; color: #2c3e50; font-weight: 600; }

    .profile-btn .pname { display: block; font-size: 13px; }
    .profile-btn .pexample { display: block; font-size: 10px; color: #999; margin-top: 2px; }
    .profile-btn.active .pexample { color: #4A90D9; }

    .profile-btn.full-width {
      grid-column: 1 / -1;
    }

    /* ─── Tooltip ─── */
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #2c3e50;
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.5;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #2c3e50;
    }

    .profile-btn:hover .tooltip { display: block; }

    /* ─── Counter ─── */
    .counter-section {
      display: flex; align-items: center; justify-content: center;
      padding: 16px; gap: 8px;
    }
    .counter-number { font-size: 28px; font-weight: 700; color: #4A90D9; }
    .counter-text { font-size: 12px; color: #888; line-height: 1.3; }

    /* ─── Domain ─── */
    .domain-row {
      display: flex; align-items: center; justify-content: space-between; padding: 8px 0;
    }
    .domain-name {
      font-size: 13px; color: #333; font-family: 'SF Mono', Consolas, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px;
    }
    .domain-actions { display: flex; gap: 4px; }

    .btn-small {
      padding: 4px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; cursor: pointer; color: #666; transition: all 0.15s;
    }
    .btn-small:hover { background: #f5f5f5; border-color: #bbb; }
    .btn-small.active-block { background: #fee; border-color: #e88; color: #c44; }
    .btn-small.active-allow { background: #efe; border-color: #8c8; color: #4a4; }

    /* ─── Report ─── */
    .report-section { padding: 12px 16px; }
    .report-row { display: flex; gap: 6px; margin-top: 6px; }
    .report-row input {
      flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none;
    }
    .report-row input:focus { border-color: #4A90D9; }

    .btn-report {
      padding: 6px 12px; background: #4A90D9; color: #fff; border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .btn-report:hover { background: #3a7bc8; }

    .report-hint {
      font-size: 11px; color: #bbb; margin-top: 4px;
    }
    .report-success {
      font-size: 11px; color: #4a4; margin-top: 4px; display: none;
    }

    .btn-select {
      padding: 4px 8px; font-size: 11px; border: 1px solid #4A90D9; border-radius: 4px;
      background: #EBF3FC; cursor: pointer; color: #4A90D9; font-weight: 600;
      white-space: nowrap;
    }
    .btn-select:hover { background: #d6e8f8; }

    .footer {
      padding: 8px 16px; border-top: 1px solid #f0f0f0; text-align: center;
    }
    .footer a { font-size: 11px; color: #999; text-decoration: none; }
    .footer a:hover { color: #4A90D9; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>TrueGender</h1>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggleLabel">An</span>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Profile selection -->
  <div class="section">
    <div class="section-title">Profil</div>
    <div class="profile-grid">
      <button class="profile-btn" data-gender="m">
        <span class="pname">Männlich</span>
        <span class="pexample">Kunden, der, er</span>
        <div class="tooltip">
          Kund:innen → Kunden<br>
          der:die → der<br>
          Expert:in → Experte
        </div>
      </button>
      <button class="profile-btn" data-gender="w">
        <span class="pname">Weiblich</span>
        <span class="pexample">Kundinnen, die, sie</span>
        <div class="tooltip">
          Kund:innen → Kundinnen<br>
          der:die → die<br>
          Expert:in → Expertin
        </div>
      </button>
      <button class="profile-btn" data-gender="g">
        <span class="pname">Generisches Mask.</span>
        <span class="pexample">Kunden, der, er</span>
        <div class="tooltip">
          Kund:innen → Kunden<br>
          der:die → der<br>
          Expert:in → Experte
        </div>
      </button>
      <button class="profile-btn" data-gender="n">
        <span class="pname">Neutral</span>
        <span class="pexample">Kundschaft, Fachleute</span>
        <div class="tooltip">
          Kund:innen → Kundschaft<br>
          Expert:innen → Fachleute<br>
          jede:r → alle
        </div>
      </button>
      <button class="profile-btn full-width" data-gender="c">
        <span class="pname">Custom-Profil</span>
        <span class="pexample">Deine eigenen Ersetzungen</span>
        <div class="tooltip">
          Eigene Ersetzung pro Regel<br>
          Konfigurierbar in den Einstellungen
        </div>
      </button>
    </div>
  </div>

  <!-- Counter -->
  <div class="counter-section">
    <span class="counter-number" id="counter">0</span>
    <span class="counter-text">Ersetzungen<br>auf dieser Seite</span>
  </div>

  <!-- Domain -->
  <div class="section">
    <div class="section-title">Diese Seite</div>
    <div class="domain-row">
      <span class="domain-name" id="currentDomain">—</span>
      <div class="domain-actions">
        <button class="btn-small" id="btnBlock">Blockieren</button>
        <button class="btn-small" id="btnAllow">Erlauben</button>
      </div>
    </div>
  </div>

  <!-- Report -->
  <div class="report-section">
    <div class="section-title">Wort melden</div>
    <div class="report-row">
      <input type="text" id="reportWord" placeholder="Nicht erkanntes Wort…">
      <button class="btn-select" id="btnFromSelection" title="Markierten Text von der Seite übernehmen">Auswahl</button>
      <button class="btn-report" id="btnReport">Melden</button>
    </div>
    <div class="report-hint" id="reportHint">Tipp: Text auf der Seite markieren, dann „Auswahl" klicken</div>
    <div class="report-success" id="reportSuccess">Gespeichert!</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="#" id="openOptions">Einstellungen & Profil-Editor</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
